<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920">
    <title>HOLO FAQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
        }
        .container {
            max-width: 1920px;
            margin: 0 auto;
            padding: 80px 120px;
        }
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 80px;
            padding-bottom: 40px;
            border-bottom: 2px solid #f0f0f0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #E53935;
        }
        .title {
            font-size: 56px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .subtitle {
            font-size: 24px;
            color: #666;
            margin-top: 10px;
        }
        .product-tag {
            background: #E53935;
            color: #fff;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 600;
        }
        /* FAQ Grid */
        .faq-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }
        .faq-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 40px;
            border-left: 6px solid #E53935;
        }
        .faq-q {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }
        .faq-num {
            background: #E53935;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .faq-a {
            font-size: 20px;
            color: #555;
            line-height: 1.6;
            padding-left: 55px;
        }
        /* Footer */
        .footer {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .contact {
            font-size: 20px;
            color: #666;
        }
        .contact strong {
            color: #E53935;
        }
        .brand {
            font-size: 18px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="logo">HOLO</div>
                <div>
                    <div class="title">Frequently Asked Questions</div>
                    <div class="subtitle">Common questions about belt splicing machines</div>
                </div>
            </div>
            <div class="product-tag">{{product_code}}</div>
        </div>

        <div class="faq-grid">
            {{faq_items}}
        </div>

        <div class="footer">
            <div class="contact">
                <strong>sale@18816.cn</strong> | WhatsApp: <strong>+86 18057753889</strong>
            </div>
            <div class="brand">HOLO Industrial Equipment | www.holobelt.com</div>
        </div>
    </div>
</body>
</html>
