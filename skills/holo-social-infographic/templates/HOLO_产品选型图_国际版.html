<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920">
    <title>HOLO Product Selection Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
        }
        .container {
            max-width: 1920px;
            margin: 0 auto;
            padding: 80px 100px;
        }
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 2px solid #f0f0f0;
        }
        .logo {
            font-size: 36px;
            font-weight: 700;
            color: #E53935;
        }
        .title {
            font-size: 52px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .subtitle {
            font-size: 22px;
            color: #666;
            margin-top: 10px;
        }
        /* Product Grid */
        .products-section h2 {
            font-size: 36px;
            margin-bottom: 40px;
            color: #1a1a1a;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 60px;
        }
        .product-card {
            background: #fff;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            padding: 30px;
            transition: all 0.3s ease;
        }
        .product-card:hover {
            border-color: #E53935;
            box-shadow: 0 10px 40px rgba(229, 57, 53, 0.1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .product-code {
            font-size: 28px;
            font-weight: 700;
            color: #E53935;
        }
        .product-type {
            font-size: 14px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-name {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .card-specs {
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
            margin-bottom: 15px;
        }
        .spec-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .spec-label {
            color: #888;
        }
        .spec-value {
            color: #1a1a1a;
            font-weight: 600;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag {
            background: #fef2f2;
            color: #E53935;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        /* Selection Guide */
        .selection-guide {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 50px;
        }
        .selection-guide h3 {
            font-size: 32px;
            color: #1a1a1a;
            margin-bottom: 40px;
        }
        .guide-steps {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }
        .guide-step {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .step-num {
            width: 50px;
            height: 50px;
            background: #E53935;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .step-text {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .step-text strong {
            font-size: 20px;
            color: #1a1a1a;
        }
        .step-text span {
            font-size: 16px;
            color: #666;
            line-height: 1.5;
        }
        /* Footer */
        .footer {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .contact {
            font-size: 20px;
            color: #666;
        }
        .contact strong {
            color: #E53935;
        }
        .brand {
            font-size: 18px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">HOLO</div>
            <div>
                <div class="title">{{title}}</div>
                <div class="subtitle">Complete product lineup for belt splicing solutions</div>
            </div>
        </div>

        <div class="products-section">
            <h2>Product Lineup</h2>
            <div class="product-grid">
                {{product_cards}}
            </div>
        </div>

        {{selection_guide}}

        <div class="footer">
            <div class="contact">
                Need help selecting? <strong>sale@18816.cn</strong> | <strong>+86 18057753889</strong>
            </div>
            <div class="brand">HOLO Industrial Equipment | www.holobelt.com</div>
        </div>
    </div>
</body>
</html>
