    layer: outreach
  quotation-generator:
    path: "skill://quotation-generator"
    description: "PDF报价单生成。生成专业Proforma Invoice，支持多语言，用于报价审批后发送给客户。"
    layer: outreach
  telegram-toolkit:
    path: "skill://telegram-toolkit"
    description: "Telegram渠道技能。Bot commands/inline keyboard/大文件策略，俄罗斯/伊朗/独联体市场主渠道。"
    layer: outreach

  # === 支持层 ===
  honglong-products:
    path: "skill://honglong-products"
    description: "产品知识库。风冷机/水冷机/分层机/导条机/打齿机等全系列产品规格参数。"
    layer: persona
  fumamx-crm:
    path: "skill://fumamx-crm"
    description: "孚盟MX CRM自动化。客户查询/创建/更新/筛选/发送邮件。"
