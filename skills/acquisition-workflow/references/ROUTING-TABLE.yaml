# ============================================================
# 红龙获客系统 - 技能路由表（声明式配置）
# 版本: 2.9.0 | 更新时间: 2026-04-14
#
# v2.9.0: 精简skills_index，移除31个归档技能的引用；修复4个不存在的技能
# v2.8.0: 多语种词簇搜索 + market_development意图
#
# 格式：意图识别 → 技能路由 → 铁律检查
# ============================================================

# ── 多语种搜索配置 ─────────────────────────────────────────
#
# 当 market_aware=true 的意图被触发时，检查目标国家是否在此表中
# 若命中 → 启用本地语言词簇搜索（参考 MULTILANG-KEYWORDS.md）
# 若未命中 → 使用英语搜索

multilang:
  enabled: true
  keywords_file: "references/MULTILANG-KEYWORDS.md"

  # 国家 → 语言 映射表
  language_map:
    # 德语区
    DE: german
    AT: german
    CH: german
    # 西班牙语区
    ES: spanish
    MX: spanish_latam
    CO: spanish_latam
    PE: spanish_latam
    AR: spanish_latam
    CL: spanish_latam
    VE: spanish_latam
    # 法语区
    FR: french
    BE: french
    MA: french_africa   # 摩洛哥
    DZ: french_africa   # 阿尔及利亚
    TN: french_africa   # 突尼斯
    # 葡语区
    BR: portuguese_brazil
    PT: portuguese_europe
    AO: portuguese_europe # 安哥拉
    # 阿拉伯语区
    SA: arabic
    AE: arabic
    EG: arabic
    KW: arabic
    QA: arabic
    # 东南亚
    ID: indonesian
    VN: vietnamese
    # 东欧/其他
    TR: turkish
    PL: polish

  # 搜索策略：必须先跑本地语言，再补充英语
  search_rounds:
    - round: 1
      language: local        # 目标国本地语言
      mandatory: true        # 必须执行，不可跳过
    - round: 2
      language: english      # 英语补充
      mandatory: true
    - round: 3
      language: local        # 本地语LinkedIn决策人搜索
      platform: linkedin
      mandatory: false       # 有时间则执行

# ── 意图识别 ──────────────────────────────────────────────
#
# AI 根据用户输入匹配意图关键词，确定用户要做什么。
# 匹配规则：关键词命中即触发对应意图。

intents:
  customer_discovery:
    keywords: [找客户, 搜索客户, 获客, 批量搜索, 搜索公司, find customers, lead generation, prospecting]
    description: "发现潜在客户"
    market_aware: true        # 需要区分国内/海外

  market_development:
    keywords: [开发市场, 开发南美, 开发非洲, 开发东南亚, 开发中东, 开发欧洲, 开发北美, 开发澳洲, 拓展市场, 市场拓展, 市场分析, 市场调研, market development, market research, explore market, expand market, South America, Africa, Southeast Asia]
    description: "市场分析与批量获客"
    market_aware: true
    auto_detect_region: true   # 自动识别目标市场区域

  company_research:
    keywords: [背调, 评估, ICP, 调研, 公司分析, 背景调查, research, due diligence, evaluate]
    description: "企业背调和评估"
    market_aware: true

  decision_maker_search:
    keywords: [决策人, 联系人, 采购经理, LinkedIn搜索, decision maker, contact, buyer, procurement]
    description: "搜索企业决策人/采购负责人"
    market_aware: false       # 国内海外统一用Exa

  email_outreach:
    keywords: [发邮件, 开发信, 邮件, 发送, outreach, cold email, send email]
    description: "邮件触达（开发信生成+发送）"
    market_aware: true

  whatsapp_outreach:
    keywords: [WhatsApp, 发WhatsApp, WhatsApp消息, wa消息, whatsapp, whatsapp outreach]
    description: "WhatsApp消息触达"
    market_aware: false

  multi_channel_outreach:
    keywords: [智能触达, 多渠道触达, 多通道, 双通道, 全渠道触达, omni-channel]
    description: "智能选择触达渠道（邮箱/WhatsApp）"
    market_aware: true

  social_media_outreach:
    keywords: [Facebook, Instagram, LinkedIn运营, 社媒, 发帖, social media, post]
    description: "社交媒体运营和内容发布"
    platform_aware: true      # 需要区分平台

  quotation:
    keywords: [报价, 报价单, 价格, quote, quotation, pricing]
    description: "生成产品报价单"

  sales_response:
    keywords: [回复客户, 收到询盘, 客户说太贵, 客户议价, 异议处理, 客户还价, 销售应答, inquiry response, sales reply, objection handling, 回复邮件, 怎么回客户, 销售话术, 谈判策略, negotiation, 客户的问题]
    description: "销售智能应答 - 处理客户回复、异议处理、文化适配、生成回复"
    market_aware: true

  crm_import:
    keywords: [导入孚盟, 导入CRM, 生成导入模板, 一键导入, 批量导入客户, 客户数据同步, 导出到孚盟]
    description: "客户数据导入孚盟CRM"
    market_aware: false

  full_pipeline:
    keywords: [完整流程, 端到端, 全流程, 全套, full pipeline, end to end]
    description: "完整获客流程（搜索→背调→筛选→触达）"

  telegram_outreach:
    keywords: [Telegram, 电报, tg, telegram outreach, 电报触达]
    description: "Telegram消息触达（俄罗斯/伊朗/独联体市场）"
    market_aware: false

  heartbeat_check:
    keywords: [心跳, 自动巡检, pipeline检查, heartbeat, 系统检查]
    description: "手动触发HEARTBEAT检查"
    market_aware: false

  knowledge_graph:
    keywords: [知识图谱, 图谱, graphify, 客户关系图, 产品关系图, 构建图谱]
    description: "构建和分析知识图谱"
    market_aware: false

  pdf_quote:
    keywords: [PDF报价, 生成报价单, pdf quote, 报价单PDF, 形式发票]
    description: "生成PDF格式报价单"
    market_aware: false


# ── 技能路由 ──────────────────────────────────────────────
#
# 根据意图+市场/平台条件选择技能。
# priority: 数字越大优先级越高
# fallback: 主技能不可用时的备选（按顺序尝试）

routing:
  customer_discovery:
    # ⭐ v2.8.0：非英语市场自动启用多语种词簇搜索
    # 执行顺序：①检查 multilang.language_map → ②加载本地词簇 → ③构造查询
    # 词簇库：references/MULTILANG-KEYWORDS.md
    overseas:
      - skill: teyi-customs
        priority: 5
        condition: "需要采购记录数据"
        fallback: [exa-search]
      - skill: exa-search
        priority: 4
        condition: "通用语义搜索（非英语市场必须先用本地语言词簇，见multilang配置）"
        multilang: true          # 启用多语种词簇
        search_rounds: 3         # 执行三轮搜索（本地语言→英语→LinkedIn本地头衔）
        fallback: []
      - skill: facebook-acquisition
        priority: 3
        condition: "Facebook渠道"
        fallback: [exa-search]
    domestic:
      - skill: exa-search
        priority: 5
        condition: "通用搜索"
        fallback: []

  market_development:
    # ⭐ v2.8.0：市场开发时同样触发多语种词簇搜索
    overseas:
      - skill: market-research
        priority: 5
        condition: "市场研究+行业分析"
        next: [market-research, exa-search]
        fallback: [exa-search]
      - skill: exa-search
        priority: 4
        condition: "批量客户发现（非英语市场自动切换本地词簇，参见multilang配置）"
        multilang: true          # 启用多语种词簇
        search_rounds: 3
        fallback: []
    domestic:
      - skill: exa-search
        priority: 5
        condition: "国内市场分析"
        fallback: []

  company_research:
    overseas:
      - skill: teyi-customs
        priority: 5
        condition: "需要海关采购数据"
        fallback: [exa-search]
      - skill: company-research
        priority: 4
        condition: "通用企业背调"
        fallback: [exa-search]
      - skill: deep-research
        priority: 3
        condition: "深度调研"
        fallback: [company-research]
    domestic:
      - skill: company-research
        priority: 5
        condition: "通用企业背调"
        fallback: [exa-search]

  decision_maker_search:
    all_markets:
      - skill: exa-search
        priority: 5
        condition: "通过Exa搜索LinkedIn公开档案"
        fallback: []
      - skill: company-research
        priority: 3
        condition: "通过企业背调获取联系人"
        fallback: []

  email_outreach:
    overseas:
      - skill: cold-email-generator
        priority: 5
        condition: "开发信生成（v2.0打磨流程）"
        next: [email-sender]
      - skill: email-sender
        priority: 4
        condition: "SMTP邮件发送"
        next: [delivery-queue]
      - skill: delivery-queue
        priority: 3
        condition: "分段队列发送"
        fallback: [email-sender]
      - skill: cold-email-generator
        priority: 2
        condition: "开发信运营（供应商询价等）"
        fallback: []
    domestic:
      - skill: email-sender
        priority: 5
        condition: "SMTP邮件发送"
        next: [delivery-queue]
      - skill: delivery-queue
        priority: 4
        condition: "分段队列发送"
        fallback: [email-sender]

  whatsapp_outreach:
    all_markets:
      - skill: whatsapp-outreach
        priority: 5
        condition: "WhatsApp消息触达"
        next: [delivery-queue]
        fallback: [email-sender]
      - skill: delivery-queue
        priority: 3
        condition: "WhatsApp分段队列"
        fallback: [whatsapp-outreach]

  multi_channel_outreach:
