# ── 故障切换映射 ──────────────────────────────────────────
#
# 当主技能不可用时，按 fallback 顺序尝试备选。
# "不可用"的定义：技能文件不存在 / 技能执行失败 / 平台不支持

fallback_map:
  teyi-customs: [exa-search]
  facebook-acquisition: [exa-search]
  exa-search: []
  email-sender: [delivery-queue]
  cold-email-generator: []
  whatsapp-outreach: []
  ai-social-media-content: [facebook-acquisition]


# ── 质量铁律 ──────────────────────────────────────────────
#
# 以下规则在任何情况下都必须遵守，不可绕过。

iron_rules:
  - id: email_rule
    description: "必须用决策人邮箱，禁用info@"
    stage: phase_1.5
    blocking: true

  - id: icp_score_rule
    description: "ICP评分≥75分才发邮件"
    stage: phase_3
    blocking: true

  - id: email_quality_rule
    description: "开发信评分≥9.0分才发送"
    stage: phase_4
    blocking: true

  - id: contact_verification
    description: "禁止未经验证的单一来源联系方式"
    stage: phase_1.5
    blocking: true

  - id: no_email_no_continue
    description: "无有效邮箱不继续触达流程"
    stage: phase_1.5
    blocking: true

  - id: no_mining
    description: "禁止矿业客户"
    stage: phase_3
    blocking: true

  - id: whatsapp_safety
    description: "WhatsApp消息必须用户确认后才发送，禁止群发"
    stage: phase_4
    blocking: true

  - id: whatsapp_frequency
    description: "同一联系人每天最多3条WhatsApp消息"
    stage: phase_4
    blocking: true

  - id: email_polish
    description: "开发信必须经过打磨流程"
    stage: phase_4
    blocking: false

  - id: quote_lock
    description: "客户问价必须锁对话等审批，不能直接给数字"
    stage: phase_5
    blocking: true

  - id: authorization_matrix
    description: "超出授权矩阵的参数（折扣>5%/非标付款/OA赊账/延期交期等）必须升级老板"
    stage: phase_6
    blocking: true

  - id: skill_protocol
    description: "使用skill://协议引用技能"
    stage: all
    blocking: false



# ── 子技能索引（精简版 v2.9.0）────────────────────────────────
#
# 仅列出真实存在的技能。已归档技能移至 .archive/
# layer分类: orchestration | discovery | intelligence | outreach | support | entry | persona

skills_index:
  # === 编排层 ===
  acquisition-coordinator:
    path: "skill://acquisition-coordinator"
    description: "获客任务协调器。拆解复杂任务、读取子技能、执行并整合结果。"
    layer: orchestration
  acquisition-evaluator:
    path: "skill://acquisition-evaluator"
    description: "独立验收Agent。验收背调报告、检查开发信质量、审核报价准确性。"
    layer: orchestration
  acquisition-init:
    path: "skill://acquisition-init"
    description: "初始化引导。配置凭据、挂载NAS、测试邮箱。"
    layer: orchestration
  acquisition-workflow:
    path: "skill://acquisition-workflow"
    description: "获客工作流。端到端流程定义、质量检查点、输出格式规范。"
    layer: orchestration

  # === 发现层 ===
  teyi-customs:
    path: "skill://teyi-customs"
    description: "特易海关数据。发现从中国进口工业皮带设备的海外买家采购记录。"
    layer: discovery
  exa-search:
    path: "skill://exa-search"
    description: "AI深度搜索（MCP: mcporter call exa.xxx）。语义搜索/LinkedIn决策人/企业情报。"
    layer: discovery
  facebook-acquisition:
    path: "skill://facebook-acquisition"
    description: "Facebook客户搜索。挖掘行业群组、获取公司主页信息。"
    layer: discovery
  instagram-acquisition:
    path: "skill://instagram-acquisition"
    description: "Instagram客户搜索。挖掘行业标签、获取公司账号信息。"
    layer: discovery
  linkedin:
    path: "skill://linkedin"
    description: "LinkedIn AI触达。搜索决策人、通过agent-browser发送消息。"
    layer: discovery

  # === 情报层 ===
  company-research:
    path: "skill://company-research"
    description: "海外B2B企业背景调查。输出结构化背调报告，用于ICP评分和开发信个性化。"
    layer: intelligence
  market-research:
    path: "skill://market-research"
    description: "市场研究。红龙定制包装入口，自动加载HONGLONG-OVERRIDE.md。"
    layer: intelligence
  deep-research:
    path: "skill://deep-research"
    description: "深度多源调研。公司/市场/行业系统性调研，方法论追踪+迭代深入。"
    layer: intelligence
  customer-intelligence:
    path: "skill://customer-intelligence"
    description: "客户情报整合。市场调研+背调+竞品分析，支持动态ICP评分。"
    layer: intelligence

  # === 触达层 ===
  cold-email-generator:
    path: "skill://cold-email-generator"
    description: "开发信生成v2.0。打磨流程+AI检测+多轮润色，评分≥9.0分才发送。"
    layer: outreach
  email-sender:
    path: "skill://email-sender"
    description: "SMTP邮件发送。引导式配置、自动发送开发信和跟进邮件。"
    layer: outreach
  email-inbox:
    path: "skill://email-inbox"
    description: "邮件收件检测。IMAP连接企业邮箱，检测客户回复和询价。"
    layer: outreach
  whatsapp-outreach:
    path: "skill://whatsapp-outreach"
    description: "WhatsApp触达。通过wacli发送，支持文本/文件/产品目录/批量发送。"
    layer: outreach
  delivery-queue:
    path: "skill://delivery-queue"
    description: "消息分段发送。模拟真人发送节奏，定时发送+drip campaign。"
    layer: outreach
  sales-response:
    path: "skill://sales-response"
    description: "销售智能应答。异议处理(15种)+商业文化画像(18国)+产品FAQ+谈判策略。"
    layer: outreach
  ai-social-media-content:
    path: "skill://ai-social-media-content"
