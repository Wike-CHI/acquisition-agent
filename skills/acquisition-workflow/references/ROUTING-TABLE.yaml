    layer: orchestration
  cold-email-generator:
    path: "skill://cold-email-generator"
    description: "开发信生成技能v2.0 - 真正打磨流程。根据客户背景、产品匹配度、目标市场文化，生成高质量、个性化的 B2B 开发信。支持AI检测、多轮润色、严格评分（≥9."
