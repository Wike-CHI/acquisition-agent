  company-research:
    path: "skill://company-research"
    description: "红龙获客系统·海外B2B企业背景调查 — 输入海外企业名称，自动搜集企业公开信息并输出结构化背调报告，用于客户资质评估和开发信个性化。支持全球搜索引擎、Link"
    layer: intelligence
  credential-manager:
    path: "skill://credential-manager"
