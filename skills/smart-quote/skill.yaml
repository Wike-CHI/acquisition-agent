name: smart-quote
version: 2.0.0
description: >-
  红龙智能报价技能 v2.0 - 先背调后报价，给业务员利润率范围和价格区间。
  先调用company-research背调，根据企业规模/ICP评分/付款能力确定利润率区间，让业务员灵活报价。
  核心原则：不直接给价格表，只给利润率范围，让业务员灵活报价。
triggers:
  - 报价
  - 报价单
  - 价格
  - 智能报价
  - 给客户报价
  - 生成报价
  - quote
  - quotation
  - pricing
dependencies:
  - company-research
tags:
  - sales
  - quote
  - pricing
author:
  name: 红龙团队
  github: https://github.com/Wike-CHI
license: Proprietary
entry: SKILL.md
directories:
  scripts: scripts/
  references: references/
requires:
  bins: []
  api_keys: []
  env: {}
capability: enhanced
priority: 70
compatibility:
  workbuddy: '>=2.0'
  claude_code: true
  openclaw: '>=2.5'
