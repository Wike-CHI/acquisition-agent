name: sales-response
version: 1.0.1
description: >-
  销售智能应答技能 - 红龙获客系统的客户回复处理中心。
  收到客户邮件/WhatsApp回复后，自动分类异议、匹配合适话术、生成个性化回复。
  覆盖：异议处理(15种)、各国商业文化画像(18国)、产品FAQ、谈判策略、竞品情报。
triggers:
  - 回复客户
  - 收到询盘
  - 客户说太贵
  - 异议处理
  - 客户议价
  - inquiry response
  - sales reply
  - objection handling
dependencies: []
tags:
  - sales
  - response
  - objection-handling
author:
  name: 红龙团队
  github: https://github.com/Wike-CHI
license: Proprietary
entry: SKILL.md
directories:
  scripts: scripts/
  references: references/
requires:
  bins: []
  api_keys: []
  env: {}
capability: enhanced
priority: 60
compatibility:
  workbuddy: '>=2.0'
  claude_code: true
  openclaw: '>=2.5'
