name: acquisition-coordinator
version: 2.1.0
description: 获客任务协调器。负责拆解复杂获客任务、读取子技能SKILL.md并按步骤执行、整合结果。当用户请求：(1) 完整获客流程 (2) 批量背调
  (3) 并行搜索 (4) 多步骤获客任务 时使用此技能。
triggers:
- 批量获客
- 完整流程
- 并行搜索
- 批量背调
- 多步骤任务
- 协调
- coordinator
dependencies: []
tags:
- acquisition
author:
  name: 红龙团队
  github: https://github.com/Wike-CHI
license: Proprietary
entry: SKILL.md
directories:
  scripts: scripts/
  references: references/
  assets: assets/
requires:
  bins:
    - mcporter
  api_keys:
    - EXA_API_KEY
  env:
    WORKSPACE: .workbuddy
capability: core
priority: 50
compatibility:
  workbuddy: '>=2.0'
  claude_code: true
  openclaw: '>=2.5'
