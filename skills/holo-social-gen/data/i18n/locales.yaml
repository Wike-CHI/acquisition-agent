# ============================================================
# 产品描述（按机型代码，多语种）
# ============================================================
product_descriptions:
  # --- A2FLJ 二代风冷 ---
  A2FLJ:
    en: "The A2FLJ series represents HOLO's proven air-cooled vulcanizing technology. Cost-effective solution for standard belt splicing applications."
    es: "La serie A2FLJ representa la tecnología de vulcanización por aire refrigerado comprobada de HOLO. Solución rentable para aplicaciones estándar de empalme de bandas."
    pt: "A série A2FLJ representa a tecnologia de vulcanização a arrefecida comprovada da HOLO. Solução econômica para aplicações padrão de emenda de esteiras."
    ar: "تمثل سلسلة A2FLJ تقنية الفلكنة المبردة بالهواء الموثوقة من هولونج. حل اقتصادي لتطبيقات ربط الأحزمة القياسية."
    ru: "Серия A2FLJ представляет проверенную технологию вулканизации с воздушным охлаждением от HOLO. Эффективное решение для стандартных задач соединения конвейерных лент."
    fr: "La série A2FLJ représente la technologie de vulcanisation à air refroidie éprouvée de HOLO. Solution économique pour les applications standard de jonctionnement de bandes."
    de: "Die A2FLJ-Serie stellt HOLOs bewährte luftgekühlte Vulkanisierungstechnologie dar. Kostengünstige Lösung für Standard-Förderbandverbindungsanwendungen."
    ko: "A2FLJ 시리즈는 HOLO의 입증된 공랭식 벌커나이징 기술을 대표합니다. 표준 컨베어 벨트 접합 애플리케이션에 대한 비용 효율적인 솔루션입니다."
    ja: "A2FLJシリーズはHOLOの実績ある空冷加硫技術を代表します。標準的なコンベアベルト接合用途にコスト効率の良いソリューションです。"
    zh: "A2FLJ系列是红龙成熟的风冷硫化技术。经济型标准皮带接头解决方案。"

  # --- A3FLJ 三代风冷 ---
  A3FLJ:
    en: "The A3FLJ series features our third-generation air-cooled technology with enhanced efficiency. Supports belt width up to {width}, ideal for mining, cement, ports, and heavy industry."
    es: "La serie A3FLJ cuenta con nuestra tecnología de tercera generación refrigerada por aire con mayor eficiencia. Soporta anchos de banda hasta {width}, ideal para minería, cemento, puertos e industria pesada."
    pt: "A série A3FLJ apresenta nossa tecnologia de terceira geração arrefecida por ar com eficiência aprimorada. Suporta larguras de faixa até {width}, ideal para mineração, cimento, portos e indústria pesada."
    ar: "تتميز سلسلة A3FLJ بتقنيتنا الجيل الثالثة المبردة بالهواء بكفاءة محسّنة. تدعم عرض الحزام حتى {width}، مثالية للمناجم والأسمنت والموانئ والصناعات الثقيلة."
    ru: "Серия A3FLJ оснащена нашей технологией третьего поколения с воздушным охлаждением и повышенной эффективностью. Поддерживает ширину ленты до {width}, идеальна для горной промышленности, цемента, портов и тяжелой промышленности."
    fr: "La série A3FLJ dispose de notre technologie de troisième génération à air refroidi avec une efficacité améliorée. Supporte des largeurs de bande jusqu'à {width}, idéale pour les mines, le ciment, les ports et l'industrie lourde."
    de: "Die A3FLJ-Serie verfügt über unsere Luftkühltechnologie der dritten Generation mit verbesserter Effizienz. Unterstützt Bandbreiten bis {width}, ideal für Bergbau, Zement, Häfen und Schwerindustrie."
    ko: "A3FLJ 시리즈는 향상된 효율의 3세대 공랭식 기능을 갖추고 있습니다. {width}까지의 벨트 폭을 지원하며, 광산, 시멘트, 항만, 중공업에 이상적입니다."
    ja: "A3FLJシリーズは第3世代空冷技術を搭載し、効率が向上しています。ベルト幅{width}まで対応し、鉱山、セメント、港、重工業に最適です。"
    zh: "A3FLJ系列采用第三代风冷技术，效率更高。支持带宽{width}，适用于矿山、水泥、港口及重工业。"

  # --- A4FLJ 四代风冷 ---
  A4FLJ:
    en: "The A4FLJ series is our flagship fourth-generation air-cooled splicing solution with aviation-grade aluminum body and dual titanium plates."
    es: "La serie A4FLJ es nuestra solución insignia de cuarta generación con cuerpo de aluminio de grado aeronáutico y placas de titanio duales."
    pt: "A série A4FLJ é nossa solução de emenda de quarta geração com corpo de alumínio grau aeronáutico e placas duplas de titânio."
    ar: "سلسلة A4FLJ هي حلول الجيل الرابع الرئيسية لدينا بهيكل من ألمنيوم درجة طيران ولوحتين من التيتانيوم."
    ru: "Серия A4FLJ — наше флагманское решение четвертого поколения с авиационным алюминиевым корпусом и двойными титановыми пластинами."
    fr: "La série A4FLJ est notre solution phare de quatrième génération avec corps en aluminium de qualité aéronautique et plaques de titane doubles."
    de: "Die A4FLJ-Serie ist unsere Flaggschiff-Lösung der vierten Generation mit flugzeugfähigem Aluminiumgehäuse und doppelten Titanplatten."
    ko: "A4FLJ 시리즈는 항공급 알루미늄 바디와 듀얼 티타늄 플레이트를 갖춘 4세대 플래그십 솔루션입니다."
    ja: "A4FLJシリーズは航空級アルミボディとデュアルチタンプレートを搭載した第4世代フラッグシップソリューションです。"
    zh: "A4FLJ系列是我们的第四代旗舰产品，采用航空铝机身+双钛板结构。"

  # --- A1SLJ 水冷 ---
  A1SLJ:
    en: "The A1SLJ water-cooling series delivers reliable heavy-duty performance for wide belt applications in mining and bulk material handling."
    es: "La serie A1SLJ refrigerada por agua ofrece un rendimiento fiable para aplicaciones de bandas anchas en minería y manejo de materiales a granel."
    pt: "A série A1SLJ resfriada por água oferece desempenho robusto confiável para aplicações de faixas largas em mineração e manuseio de materiais a granel."
    ar: "توفر سلسلة A1SLJ المبردة بالماء أداءً موثوقًا للتطبيقات الثقيلة ذات الأحزمة العريضة في المناجم ومعالجة المواد السائبة."
    ru: "Серия A1SLJ с водяным охлаждением обеспечивает надежную производительность для широких лент в горной промышленности и обработке насыпных материалов."
    fr: "La série A1SLJ à refroidissement par eau offre des performances robustes et fiables pour les applications de bandes larges dans les mines."
    de: "Die A1SLJ-Wassühlkühlungsserie bietet zuverlässige Leistung für breite Förderbandanwendungen im Bergbau und Schüttgutbereich."
    ko: "A1SLJ 수냉식 시리즈는 광산 및 대량 자재 취급용 광폭 벨트 애플리케이션에 신뢰할 수 있는 성능을 제공합니다."
    ja: "A1SLJ水冷シリーズは鉱山・バルク物料扱い用の広幅ベルト用途で信頼性の高い重耐久性能を発揮します。"
    zh: "A1SLJ水冷系列为矿山和散料处理提供可靠的重载宽幅皮带接头方案。"

# 默认描述（未知机型）
  _default:
    en: "Professional belt splicing equipment from HOLO Industrial. Engineered for reliability in demanding industrial environments."
    es: "Equipo profesional para empalme de bandas de HOLO Industrial. Diseñado para confiabilidad en entornos industriales exigentes."
    pt: "Equipamento profissional para emenda de esteiras da HOLO Industrial. Projetado para confiabilidade em ambientes industriais exigentes."
    ar: "معدات احترافية لربط أحزمة النقل من هولونج الصناعية. مصممة للموثوقية في البيئات الصناعية الصعبة."
    ru: "Профессиональное оборудование для соединения лент от HOLO Industrial. Разработано для надежности в сложных промышленных условиях."
    fr: "Équipement professionnel pour le jonctionnement de bandes par HOLO Industrial. Conçu pour la fiabilité dans les environnements industriels exigeants."
    de: "Professionelles Förderbandverbindungsausrüstung von HOLO Industrial. Entwickelt für Zuverlässigkeit in anspruchsvollen Industrieanwendungen."
    ko: "HOLO Industrial의 전문 컨베어 벨트 접합 장비. 까다로운 산업 환경에서의 신뢰성을 위해 설계되었습니다."
    ja: "HOLO Industrialの専門コンベアベルト接合機器。過酷な産業環境での信頼性を追求して設計されています。"
    zh: "红龙工业专业皮带接头设备，为苛刻工业环境设计，性能可靠。"


