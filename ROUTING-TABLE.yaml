iron_rules:
- id: email_rule
  description: 必须用决策人邮箱，禁用info@
  stage: phase_1.5
  blocking: true
- id: icp_score_rule
  description: ICP评分≥75分才发邮件
  stage: phase_3
  blocking: true
- id: email_quality_rule
  description: 开发信评分≥9.0分才发送
  stage: phase_4
  blocking: true
- id: contact_verification
  description: 禁止未经验证的单一来源联系方式
  stage: phase_1.5
  blocking: true
- id: no_email_no_continue
  description: 无有效邮箱不继续触达流程
  stage: phase_1.5
  blocking: true
- id: no_mining
  description: 禁止矿业客户
  stage: phase_3
  blocking: true
- id: whatsapp_safety
  description: WhatsApp消息必须用户确认后才发送，禁止群发
  stage: phase_4
  blocking: true
- id: whatsapp_frequency
  description: 同一联系人每天最多3条WhatsApp消息
  stage: phase_4
  blocking: true
- id: email_polish
  description: 开发信必须经过打磨流程
  stage: phase_4
  blocking: false
- id: skill_protocol
  description: 使用skill://协议引用技能
  stage: all
  blocking: false
